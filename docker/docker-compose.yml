services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: foodtracker-app
    restart: unless-stopped
    working_dir: /var/www/
    volumes:
      - ..:/var/www
    env_file:
      - ../.env
    networks:
      - calorie-network

  nginx:
    image: nginx:alpine
    container_name: foodtracker-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ..:/var/www
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - calorie-network

  db:
    container_name: foodtracker-db
    image: mysql:8.0
    volumes:
      - ./storage/mysql:/var/lib/mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    networks:
      - calorie-network

networks:
  calorie-network:
    driver: bridge