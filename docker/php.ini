; Настройки загрузки файлов
file_uploads = On
upload_max_filesize = 10M
max_file_uploads = 20
post_max_size = 12M

; Настройки памяти
memory_limit = 256M

; Настройки времени выполнения
max_execution_time = 300
max_input_time = 300

; Настройки сессий
session.gc_maxlifetime = 1440

; Настройки ошибок
display_errors = Off
log_errors = On
error_log = /var/log/php/error.log
