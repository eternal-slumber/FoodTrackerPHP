server {
    listen 80;
    server_name admin-mycaloriebot admin.localhost;

    root /var/www/public;
    index index.php;
    client_max_body_size 2M;
    set $admin_fastcgi admin:9000;

    location /api/ {
        return 404;
    }

    location /telegram/ {
        return 404;
    }

    location /storage/ {
        return 404;
    }

    location /assets/admin/ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location /assets/ {
        return 404;
    }

    location = /ft-control-7d4c2a {
        include fastcgi_params;
        fastcgi_pass $admin_fastcgi;
        fastcgi_connect_timeout 3s;
        fastcgi_send_timeout 30s;
        fastcgi_read_timeout 30s;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
    }

    location ^~ /ft-control-7d4c2a/ {
        include fastcgi_params;
        fastcgi_pass $admin_fastcgi;
        fastcgi_connect_timeout 3s;
        fastcgi_send_timeout 30s;
        fastcgi_read_timeout 30s;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
    }

    location / {
        return 404;
    }

    location ~ \.php$ {
        return 404;
    }
}
